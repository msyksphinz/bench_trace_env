# SimPoint pipeline: build QEMU, run BBV/SimPoint, SIFT+Sniper per SimPoint, estimate IPC.
# To run the same pipeline locally: from spec2006_work run:
#   make ci-pipeline CDROM_DIR=/path/to/spec2006_cdrom
# or: CDROM_DIR=/path/to/spec2006_cdrom ./scripts/ci_pipeline.sh

name: SimPoint Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 17 * * 0'  # Weekly Sunday 17:00 UTC (Mon 02:00 JST)

env:
  CDROM_DIR: /home/kimura/spec_bechmarks/spec2006_cdrom

jobs:
  build-docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          set-safe-directory: false
      - name: Build Docker image
        run: |
          docker build -t simpoint-runner:latest \
            --build-arg RISCV_ARG=/riscv-linux \
            -f Dockerfile .

  simpoint:
    runs-on: self-hosted
    needs: build-docker
    timeout-minutes: 10080  # 1 week
    steps:
      - uses: actions/checkout@v4

      - name: Run CI pipeline
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -v /home/kimura/spec_bechmarks:/home/kimura/spec_bechmarks:ro \
            -v /home/kimura/sniper_tools:/home/kimura/sniper_tools:ro \
            -w /workspace/spec2006_work \
            -e CDROM_DIR="${{ env.CDROM_DIR }}" \
            -e RISCV=/riscv-linux \
            -e PATH=/workspace/qemu-9.2.4/build:/riscv-linux/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            simpoint-runner:latest \
            ./scripts/ci_pipeline.sh
